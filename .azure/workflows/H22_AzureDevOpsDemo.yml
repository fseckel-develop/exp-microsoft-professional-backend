trigger:
  branches:
    include:
      - main
  paths:
    include:
      - practices/(H) Deployment and DevOps/H22_AzureDevOpsDemo/src/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - practices/(H) Deployment and DevOps/H22_AzureDevOpsDemo/src/*

pool:
  name: Default

variables:
  projectPath: 'practices/(H) Deployment and DevOps/H22_AzureDevOpsDemo/src'

steps:
  - task: UseDotNet@2
    displayName: 'Install .NET SDK'
    inputs:
      packageType: 'sdk'
      version: '10.0.x'

  - script: dotnet restore
    workingDirectory: $(projectPath)
    displayName: 'Restore dependencies'

  - script: dotnet build --configuration Release --no-restore
    workingDirectory: $(projectPath)
    displayName: 'Build project'

  - script: dotnet test --no-build --verbosity normal
    workingDirectory: $(projectPath)
    displayName: 'Run tests'