trigger:
  branches:
    include:
      - main
  paths:
    include:
      - practices/(H) Deployment and DevOps/H23_AlertOnFailureDemo/src/*

pr:
  branches:
    include:
      - main
  paths:
    include:
      - practices/(H) Deployment and DevOps/H23_AlertOnFailureDemo/src/*

pool:
  name: Default

variables:
  projectPath: 'practices/(H) Deployment and DevOps/H23_AlertOnFailureDemo/src'

stages:

# =========================
# Build Stage
# =========================
- stage: Build
  jobs:
  - job: BuildJob
    steps:
      - task: UseDotNet@2
        displayName: 'Install .NET SDK'
        inputs:
          packageType: 'sdk'
          version: '10.0.x'

      - script: dotnet restore
        workingDirectory: $(projectPath)
        displayName: 'Restore dependencies'

      - script: dotnet build --configuration Release --no-restore
        workingDirectory: $(projectPath)
        displayName: 'Build project'

      - script: dotnet test --no-build --verbosity normal
        workingDirectory: $(projectPath)
        displayName: 'Run tests'

# =========================
# Notify Stage (Only if Failed)
# =========================
- stage: Notify
  dependsOn: Build
  condition: failed()

  jobs:
  - job: SendEmail
    pool:
      name: Default
    steps:
      - powershell: |
          $smtpServer = "smtp.gmail.com"
          $smtpPort = 587
          $username = "$env:EMAIL_USERNAME"
          $password = "$env:EMAIL_PASSWORD"

          $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
          $credential = New-Object System.Management.Automation.PSCredential ($username, $securePassword)

          $subject = "Azure DevOps Pipeline Failed - " + $env:BUILD_DEFINITIONNAME

          $body = @"
          Your Azure DevOps pipeline has failed.
          Project: $env:SYSTEM_TEAMPROJECT
          Pipeline: $env:BUILD_DEFINITIONNAME
          Branch: $env:BUILD_SOURCEBRANCHNAME
          Build ID: $env:BUILD_BUILDID
          View Run:
          $($env:SYSTEM_TEAMFOUNDATIONCOLLECTIONURI)$($env:SYSTEM_TEAMPROJECT)/_build/results?buildId=$($env:BUILD_BUILDID)
          "@

          Send-MailMessage -SmtpServer $smtpServer `
                           -Port $smtpPort `
                           -UseSsl `
                           -Credential $credential `
                           -From $username `
                           -To $username `
                           -Subject $subject `
                           -Body $body
        displayName: "Send Failure Email"
        env:
          EMAIL_USERNAME: $(EMAIL_USERNAME)
          EMAIL_PASSWORD: $(EMAIL_PASSWORD)
          BUILD_DEFINITIONNAME: $(Build.DefinitionName)
          BUILD_SOURCEBRANCHNAME: $(Build.SourceBranchName)
          BUILD_BUILDID: $(Build.BuildId)
          SYSTEM_TEAMPROJECT: $(System.TeamProject)
          SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: $(System.TeamFoundationCollectionUri)