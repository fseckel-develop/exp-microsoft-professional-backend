# Azure Pipelines YAML for a .NET web app that installs dependencies, runs tests, and deploys the app

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - 'practices/(H) Deployment and DevOps/H42_PipelineGenerationDemo/src/**'

pr:
  branches:
    include:
      - main
  paths:
    include:
      - 'practices/(H) Deployment and DevOps/H42_PipelineGenerationDemo/src/**'

variables:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'practices/(H) Deployment and DevOps/H42_PipelineGenerationDemo'
  buildConfiguration: 'Release'
  AZURE_WEBAPP_NAME: 'PipelineGenerationDemo'
  AZURE_RESOURCE_GROUP: 'MyResourceGroup'
  AZURE_SUBSCRIPTION_ID: '40fd5588-32a1-4393-ab0b-48371f53b87e'

stages:
  - stage: BuildAndTest
    displayName: 'Build and Test'
    jobs:
      - job: BuildTestJob
        displayName: 'Build and Test Job'
        pool:
          name: Default

        steps:
          - checkout: self
            displayName: 'Checkout code'

          - task: UseDotNet@2
            displayName: 'Setup .NET'
            inputs:
              version: $(DOTNET_VERSION)
              packageType: 'sdk'

          - task: DotNetCoreCLI@2
            displayName: 'Restore dependencies'
            inputs:
              command: 'restore'
              projects: '$(PROJECT_PATH)/**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects: '$(PROJECT_PATH)/**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run tests'
            inputs:
              command: 'test'
              projects: '$(PROJECT_PATH)/**/[Tt]ests.csproj'
              arguments: '--configuration $(buildConfiguration) --no-build --logger trx --collect:"XPlat Code Coverage"'
              publishTestResults: true

          - task: DotNetCoreCLI@2
            displayName: 'Publish application'
            inputs:
              command: 'publish'
              projects: '$(PROJECT_PATH)/**/*.csproj'
              publishWebProjects: false
              arguments: '--configuration $(buildConfiguration) --no-build --output $(Build.ArtifactStagingDirectory)'
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: 'Upload build artifacts'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'
              publishLocation: 'Container'

  - stage: Deploy
    displayName: 'Deploy to Azure'
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.Reason'], 'IndividualCI'))
    dependsOn: BuildAndTest
    jobs:
      - deployment: DeployToAppService
        displayName: 'Deploy to App Service'
        environment: 'production'
        pool:
          name: Default

        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                  displayName: 'Skip checkout for deploy job'

                - task: DownloadBuildArtifacts@1
                  displayName: 'Download build artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'single'
                    artifactName: 'drop'
                    downloadPath: '$(Pipeline.Workspace)'

                - bash: |
                    if [ ! -f $(Pipeline.Workspace)/drop/*.zip ]; then
                      echo "Error: Build artifact not found!"
                      exit 1
                    fi
                  displayName: 'Verify build artifact exists'

                - bash: |
                    echo "Authenticating with Azure using service principal..."
                    az login --service-principal \
                      -u $(AZURE_CLIENT_ID) \
                      -p $(AZURE_CLIENT_SECRET) \
                      --tenant $(AZURE_TENANT_ID) \
                      -o none

                    echo "Deploying to App Service: $(AZURE_WEBAPP_NAME)"
                    az webapp deployment source config-zip \
                      --resource-group $(AZURE_RESOURCE_GROUP) \
                      --name $(AZURE_WEBAPP_NAME) \
                      --src $(Pipeline.Workspace)/drop/*.zip \
                      -o json

                    echo "Logging out from Azure..."
                    az logout
                  displayName: 'Deploy to Azure App Service'
                  env:
                    AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
                    AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
                    AZURE_TENANT_ID: $(AZURE_TENANT_ID)
