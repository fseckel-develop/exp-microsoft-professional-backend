# A GitHub Actions workflow for a .NET web app that installs dependencies, runs tests, and deploys the app

name: Pipeline Generation Demo

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'practices/(H) Deployment and DevOps/H42_PipelineGenerationDemo/src/**'
  pull_request:
    paths:
      - 'practices/(H) Deployment and DevOps/H42_PipelineGenerationDemo/src/**'

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'practices/(H) Deployment and DevOps/H42_PipelineGenerationDemo'
  AZURE_WEBAPP_NAME: 'PipelineGenerationDemo'
  AZURE_RESOURCE_GROUP: 'MyResourceGroup'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "${{ env.PROJECT_PATH }}" --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Publish application
        run: dotnet publish "${{ env.PROJECT_PATH }}" --configuration Release --no-build --output "${{ env.PROJECT_PATH }}/publish"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'
          retention-days: 30

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: '${{ env.PROJECT_PATH }}/publish/'
          retention-days: 5

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: ./publish

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          # obtained from Azure CLI using: 
          # az ad sp create-for-rbac 
          #     --name "myApp" 
          #     --role contributor 
          #     --scopes /subscriptions/{subscription-id}/resourceGroups/{resource-group} 
          #     --sdk-auth

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          package: ./publish

      - name: Azure Logout
        run: az logout